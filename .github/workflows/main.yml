name: Build Minecraft Mod

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java 8
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '8'

    - name: Download Clean Forge MDK
      run: |
        # Скачиваем официальный проверенный шаблон для 1.16.5
        curl -L -o forge-mdk.zip https://maven.minecraftforge.net/net/minecraftforge/forge/1.16.5-36.2.34/forge-1.16.5-36.2.34-mdk.zip
        mkdir forge-project
        unzip forge-mdk.zip -d forge-project
        
        # Очищаем дефолтный пример мода, чтобы он не мешал
        rm -rf forge-project/src/main/java/com/example/examplemod

    - name: Inject HitboxMod Code
      run: |
        # Создаем правильную папку внутри скачанного проекта
        mkdir -p forge-project/src/main/java/com/example/hitboxmod
        
        # Копируем твой файл с кодом туда
        cp src/main/java/com/example/hitboxmod/HitboxMod.java forge-project/src/main/java/com/example/hitboxmod/HitboxMod.java

    - name: Configure mods.toml
      run: |
        # Перезаписываем mods.toml на наш
        cat << 'EOF' > forge-project/src/main/resources/META-INF/mods.toml
        modLoader="javafml"
        loaderVersion="[36,)"
        license="MIT"
        [[mods]]
        modId="hitboxmod"
        version="1.0"
        displayName="Hitbox Modifier"
        authors="Developer"
        description="INS - увеличить, DEL - уменьшить."
        [[dependencies.hitboxmod]]
        modId="forge"
        mandatory=true
        versionRange="[36.2.34,)"
        ordering="NONE"
        side="BOTH"
        [[dependencies.hitboxmod]]
        modId="minecraft"
        mandatory=true
        versionRange="[1.16.5]"
        ordering="NONE"
        side="BOTH"
        EOF

    - name: Build with Gradle
      run: |
        cd forge-project
        chmod +x gradlew
        ./gradlew genEclipseRuns --no-daemon || true
        ./gradlew build --no-daemon

    - name: Upload Finished Jar
      uses: actions/upload-artifact@v4
      with:
        name: HitboxMod-Forge-1.16.5
        path: forge-project/build/libs/*-shadow.jar
        # Если shadow-jar не создался, берем обычный jar:
        # path: forge-project/build/libs/*.jar
