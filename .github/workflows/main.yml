name: Build Minecraft Mod

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java 8
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: Setup Clean Project Structure
      run: |
        # Создаем правильные папки прямо в корне
        mkdir -p src/main/java/com/example/hitboxmod
        mkdir -p src/main/resources/META-INF
        
        # Если твой файл случайно сохранился в корне, переносим его на место
        if [ -f "HitboxMod.java" ]; then
          mv HitboxMod.java src/main/java/com/example/hitboxmod/HitboxMod.java
        fi

    - name: Create mods.toml
      run: |
        cat << 'EOF' > src/main/resources/META-INF/mods.toml
        modLoader="javafml"
        loaderVersion="[36,)"
        license="MIT"
        [[mods]]
        modId="hitboxmod"
        version="1.0.0"
        displayName="Hitbox Modifier"
        authors="Developer"
        description="INS - увеличить, DEL - уменьшить."
        [[dependencies.hitboxmod]]
        modId="forge"
        mandatory=true
        versionRange="[36.2.0,)"
        ordering="NONE"
        side="BOTH"
        [[dependencies.hitboxmod]]
        modId="minecraft"
        mandatory=true
        versionRange="[1.16.5, 1.17)"
        ordering="NONE"
        side="BOTH"
        EOF

    - name: Create build.gradle
      run: |
        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                maven { url = 'https://maven.minecraftforge.net/' }
                mavenCentral()
            }
            dependencies {
                classpath group: 'net.minecraftforge.gradle', name: 'ForgeGradle', version: '5.1.+'
            }
        }
        apply plugin: 'net.minecraftforge.gradle'
        version = '1.0'
        group = 'com.example.hitboxmod'
        archivesBaseName = 'hitboxmod'
        java.toolchain.languageVersion = JavaLanguageVersion.of(8)
        minecraft {
            mappings channel: 'official', version: '1.16.5'
        }
        dependencies {
            minecraft 'net.minecraftforge:forge:1.16.5-36.2.34'
        }
        jar {
            manifest {
                attributes([
                    "Specification-Title": "hitboxmod",
                    "Specification-Version": "1",
                    "Implementation-Title": project.name,
                    "Implementation-Version": project.version
                ])
            }
        }
        EOF

    - name: Download Gradle Wrapper
      run: |
        npm install -g local-gradle-wrapper
        gradle wrapper --gradle-version 7.4.2

    - name: Build Mod Jar
      run: ./gradlew build

    - name: Upload Finished Jar
      uses: actions/upload-artifact@v4
      with:
        name: HitboxMod-Forge-1.16.5
        path: build/libs/*.jar
