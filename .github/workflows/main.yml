name: Build Minecraft Mod

on:
  workflow_dispatch: # Позволит тебе запускать сборку кнопкой в любое время

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Java 8
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: Download Clean Forge Template
      run: |
        git clone https://github.com/MinecraftForge/MinecraftForge.git --depth 1 forge-template
        mkdir -p src/main/java/com/example/hitboxmod
        mkdir -p src/main/resources/META-INF
        
        # Переносим твой правильный код в чистый шаблон
        cp src/main/java/com/example/hitboxmod/HitboxMod.java forge-template/src/main/java/com/example/hitboxmod/ 2>/dev/null || cp HitboxMod.java forge-template/src/main/java/com/example/hitboxmod/ || true

    - name: Create Configuration Files
      run: |
        cd forge-template
        
        # Перезаписываем mods.toml в правильном месте
        cat << 'EOF' > src/main/resources/META-INF/mods.toml
        modLoader="javafml"
        loaderVersion="[36,)"
        license="MIT"
        [[mods]]
        modId="hitboxmod"
        version="1.0.0"
        displayName="Hitbox Modifier"
        authors="Developer"
        description="INS - увеличить, DEL - уменьшить."
        [[dependencies.hitboxmod]]
        modId="forge"
        mandatory=true
        versionRange="[36.2.0,)"
        ordering="NONE"
        side="BOTH"
        [[dependencies.hitboxmod]]
        modId="minecraft"
        mandatory=true
        versionRange="[1.16.5, 1.17)"
        ordering="NONE"
        side="BOTH"
        EOF

    - name: Grant Execute Permission
      run: chmod +x forge-template/gradlew

    - name: Build Mod Jar
      run: |
        cd forge-template
        ./gradlew build

    - name: Upload Finished Jar
      uses: actions/upload-artifact@v3
      with:
        name: HitboxMod-Forge-1.16.5
        path: forge-template/build/libs/*.jar
